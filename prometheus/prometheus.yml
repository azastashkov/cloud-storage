global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'api-server-1:8080'
          - 'api-server-2:8080'

  - job_name: 'block-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'block-server-1:8081'
          - 'block-server-2:8081'

  - job_name: 'notification-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'notification-server:8082'

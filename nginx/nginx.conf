events {
    worker_connections 1024;
}

http {
    upstream api_servers {
        server api-server-1:8080 max_fails=3 fail_timeout=30s;
        server api-server-2:8080 max_fails=3 fail_timeout=30s;
    }

    upstream block_servers {
        server block-server-1:8081 max_fails=3 fail_timeout=30s;
        server block-server-2:8081 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        client_max_body_size 500M;

        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Upload goes directly to block-server
        location /files/upload {
            proxy_pass http://block_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # All other /files/* routes go to api-server
        location /files/ {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # Notifications go to notification-server
        location /notifications/ {
            proxy_pass http://notification-server:8082;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Internal management endpoints
        location /internal/ {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Prometheus API for metrics queries
        location /prometheus/ {
            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $host;
        }

        # Actuator endpoints for monitoring
        location /actuator/ {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
        }

        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
